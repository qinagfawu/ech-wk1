name: Build & Release ECH-Workers KSU Module

on:
  workflow_dispatch:
    inputs:
      module_version:
        description: '模块版本号（如 1.0.0）'
        required: true
        default: '1.0.0'
      release_note:
        description: '版本说明'
        required: false
        default: '自动构建的 ECH-Workers KSU 模块'

jobs:
  # 第一步：编译多架构二进制（arm64+amd64）
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 编译阶段仅需读取权限
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
        include:
          - arch: arm64
            goarch: arm64
            suffix: arm64
            goos: android
          - arch: amd64
          - arch: amd64
            goarch: amd64
            suffix: x86_64
            goos: android

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Clone ech-wk source (解决模块依赖)
        run: |
          git clone https://github.com/byJoey/ech-wk.git /tmp/ech-wk
          cd /tmp/ech-wk
          go mod init ech-workers
          go mod tidy

      - name: Build ech-wk binary
        run: |
          cd /tmp/ech-wk
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export CGO_ENABLED=0
          mkdir -p $GITHUB_WORKSPACE/module_${{ matrix.suffix }}/bin
          go build -ldflags="-s -w" -o $GITHUB_WORKSPACE/module_${{ matrix.suffix }}/bin/ech-wk ./ech-workers.go
          file $GITHUB_WORKSPACE/module_${{ matrix.suffix }}/bin/ech-wk

      - name: Package KSU module
        run: |
          MODULE_VERSION=${{ github.event.inputs.module_version }}
          BUILD_DATE=$(date +%Y%m%d)
          ZIP_NAME="ech-wk-ksu-v${MODULE_VERSION}-${BUILD_DATE}-${{ matrix.suffix }}.zip"
          cd $GITHUB_WORKSPACE/module_${{ matrix.suffix }}
          # 复制模块配置文件（根据你的仓库结构调整）
          cp -r $GITHUB_WORKSPACE/module/* . 2>/dev/null || true
          zip -r ../$ZIP_NAME ./* -x "*.git*" "*.md" "*.yml"
          # 上传产物供Release阶段使用
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_PATH=$GITHUB_WORKSPACE/$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksu-module-${{ matrix.suffix }}
          path: ${{ env.ZIP_PATH }}

  # 第二步：统一创建Release（仅执行1次，上传所有架构包）
  release:
    needs: build  # 依赖编译完成
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 显式授予Release权限
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: $GITHUB_WORKSPACE/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.module_version }}
          name: ECH-Workers KSU Module v${{ github.event.inputs.module_version }}
          body: |
            ## 版本说明
            ${{ github.event.inputs.release_note }}
            ## 构建信息
            - 架构：arm64 + amd64
            - 构建时间：${{ github.run_at }}
            - 构建编号：${{ github.run_id }}
          # 上传所有架构的包
          files: |
            $GITHUB_WORKSPACE/artifacts/ksu-module-arm64/*.zip
            $GITHUB_WORKSPACE/artifacts/ksu-module-amd64/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
