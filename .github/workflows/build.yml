name: Build & Release ECH-Workers KSU Module

on:
  workflow_dispatch:
    inputs:
      module_version:
        description: '模块版本号（如 1.0.0）'
        required: true
        default: '1.0.0'
      release_note:
        description: '版本说明'
        required: false
        default: '自动构建的 ECH-Workers KSU 模块'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install arm64 compile dependencies
        run: |
          sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu

      - name: Clone ech-wk source
        run: |
          git clone https://github.com/byJoey/ech-wk.git /tmp/ech-wk
          cd /tmp/ech-wk
          cd /tmp/ech-wk
          go mod init ech-workers
          go mod tidy
          go mod download

      - name: Build ech-wk for Android arm64 (修复文件名)
        run: |
          cd /tmp/ech-wk
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0
          mkdir -p $GITHUB_WORKSPACE/module/bin
          # 输出带-arm64后缀的二进制，匹配安装脚本
          go build -ldflags="-s -w" -o $GITHUB_WORKSPACE/module/bin/ech-wk-arm64 ./ech-workers.go
          # 验证文件存在并打印信息
          ls -l $GITHUB_WORKSPACE/module/bin/
          file $GITHUB_WORKSPACE/module/bin/ech-wk-arm64
          # 给二进制加执行权限
          chmod +x $GITHUB_WORKSPACE/module/bin/ech-wk-arm64

      - name: Package KSU module
        run: |
          cd $GITHUB_WORKSPACE/module
          MODULE_VERSION=${{ github.event.inputs.module_version }}
          BUILD_DATE=$(date +%Y%m%d)
          ZIP_NAME="ech-wk-ksu-v${MODULE_VERSION}-${BUILD_DATE}-arm64.zip"
          zip -r ../$ZIP_NAME ./* -x "*.git*" "*.md" "*.yml"
          # 验证ZIP包内的二进制路径
          unzip -l ../$ZIP_NAME | grep "ech-wk-arm64"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.module_version }}
          name: ECH-Workers KSU Module v${{ github.event.inputs.module_version }}
          body: |
            ## 版本说明
            ${{ github.event.inputs.release_note }}
            ## 构建信息
            - 架构：arm64
            - 二进制文件名：ech-wk-arm64
            - 构建时间：${{ github.run_at }}
          files: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
