name: Build ECH-Workers for KernelSU

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - '**.yml'
      - 'module/**'
      - '!README.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 手动触发

jobs:
  build:
    name: Build & Package (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
        include:
          - arch: arm64
            goarch: arm64
            suffix: arm64
            target: aarch64-linux-android
          - arch: amd64
            goarch: amd64
            suffix: x86_64
            target: x86_64-linux-android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Android NDK (optional,适配安卓编译)
        run: |
          sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu

      - name: Build ECH-Workers binary
        run: |
          # 直接编译，跳过所有模块配置（避免go.mod冲突）
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
          go build -trimpath -ldflags "-s -w -extldflags '-static'" \
          -o ech-wk-${{ matrix.suffix }} ./main.go
          
          # 验证二进制文件是否生成成功
          file ech-wk-${{ matrix.suffix }}
          chmod +x ech-wk-${{ matrix.suffix }}

      - name: Prepare KSU module files
        run: |
          # 确保module目录下的子目录存在
          mkdir -p module/bin
          mkdir -p module/config
          mkdir -p module/webroot
          
          # 仅复制编译好的二进制到module/bin（核心操作）
          cp ech-wk-${{ matrix.suffix }} module/bin/ech-wk
          
          # 设置权限（修复脚本执行权限）
          chmod +x module/*.sh || true  # 忽略无sh文件的错误
          chmod +x module/bin/ech-wk
          
          # 转换换行符（修复Windows格式问题）
          sed -i 's/\r$//' module/*.sh 2>/dev/null || true
          sed -i 's/\r$//' module/module.prop 2>/dev/null || true
          sed -i 's/\r$//' module/config/default.conf 2>/dev/null || true

      - name: Package KSU module
        run: |
          # 进入module目录打包，避免路径错误
          cd module
          zip -r ../ech-wk-ksu-${{ matrix.suffix }}.zip ./* -x "*.DS_Store" "*.git*"
          cd ..
          # 验证ZIP包内容
          unzip -l ech-wk-ksu-${{ matrix.suffix }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ech-wk-ksu-${{ matrix.suffix }}
          path: ech-wk-ksu-${{ matrix.suffix }}.zip

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ech-wk-ksu-${{ matrix.suffix }}.zip
          tag_name: v1.3-${{ matrix.suffix }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
